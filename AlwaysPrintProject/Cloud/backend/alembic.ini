# Configuración de Alembic para AlwaysPrint Cloud Management

[alembic]
# Ruta al directorio de scripts de migración
script_location = alembic

# Template usado para generar archivos de migración
# file_template = %%(rev)s_%%(slug)s

# Zona horaria para timestamps en migraciones
# timezone =

# Número máximo de revisiones a mostrar en comandos de historial
# truncate_slug_length = 40

# Configuración de la base de datos
# Esta línea se sobrescribe en env.py usando la configuración de la aplicación
sqlalchemy.url = sqlite:///./alwaysprint.db

# Configuración de logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
