version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: alwaysprint-db
    environment:
      POSTGRES_USER: alwaysprint
      POSTGRES_PASSWORD: alwaysprint_password
      POSTGRES_DB: alwaysprint
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - alwaysprint-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alwaysprint"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para caché
  redis:
    image: redis:7-alpine
    container_name: alwaysprint-redis
    ports:
      - "6379:6379"
    networks:
      - alwaysprint-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alwaysprint-backend
    environment:
      DATABASE_URL: postgresql://alwaysprint:alwaysprint_password@postgres:5432/alwaysprint
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-key-in-production}
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alwaysprint-network
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alwaysprint-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - alwaysprint-network
    restart: unless-stopped

networks:
  alwaysprint-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
