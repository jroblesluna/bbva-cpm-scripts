name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'AlwaysPrintProject/Cloud/frontend/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        working-directory: AlwaysPrintProject/Cloud/frontend
        run: |
          TAG=${GITHUB_SHA::8}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://alwaysprint.apps.iol.pe" \
            --build-arg NEXT_PUBLIC_WS_URL="wss://alwaysprint.apps.iol.pe" \
            --build-arg NEXT_PUBLIC_APP_NAME="AlwaysPrint Cloud Management" \
            -t ${{ secrets.FRONTEND_ECR_URL }}:$TAG \
            -t ${{ secrets.FRONTEND_ECR_URL }}:latest .
          docker push ${{ secrets.FRONTEND_ECR_URL }}:$TAG
          docker push ${{ secrets.FRONTEND_ECR_URL }}:latest

      - name: Get SSH key
        run: |
          aws secretsmanager get-secret-value \
            --secret-id /alwaysprint/prod/ssh_private_key \
            --region ${{ secrets.AWS_REGION }} \
            --query SecretString --output text > /tmp/ec2.pem
          chmod 600 /tmp/ec2.pem

      - name: Create deploy script
        env:
          FRONTEND_ECR_URL: ${{ secrets.FRONTEND_ECR_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cat > /tmp/deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          mkdir -p /opt/alwaysprint
          if [ ! -f /opt/alwaysprint/.env.frontend ]; then
            printf "NEXT_PUBLIC_API_URL=https://alwaysprint.apps.iol.pe\nNEXT_PUBLIC_WS_URL=wss://alwaysprint.apps.iol.pe\nNEXT_PUBLIC_APP_NAME=AlwaysPrint Cloud Management\n" > /opt/alwaysprint/.env.frontend
          fi
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin $(echo ${FRONTEND_ECR_URL} | cut -d/ -f1)
          docker pull ${FRONTEND_ECR_URL}:latest
          docker rm -f alwaysprint-frontend 2>/dev/null || true
          docker run -d --name alwaysprint-frontend --restart unless-stopped --network host --env-file /opt/alwaysprint/.env.frontend ${FRONTEND_ECR_URL}:latest
          echo "Frontend OK"
          SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Deploy to EC2
        run: |
          scp -i /tmp/ec2.pem -o StrictHostKeyChecking=no /tmp/deploy.sh ec2-user@${{ secrets.EC2_HOST }}:/tmp/deploy-frontend.sh
          ssh -i /tmp/ec2.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} "bash /tmp/deploy-frontend.sh"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2.pem /tmp/deploy.sh
