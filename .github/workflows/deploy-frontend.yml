name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'AlwaysPrintProject/Cloud/frontend/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read AWS region from terraform.tfvars
        run: |
          REGION=$(grep 'aws_region' AlwaysPrintProject/Cloud/terraform/prod.tfvars | grep -oP '(?<=")[^"]+')
          echo "AWS_REGION=$REGION" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_URL: ${{ steps.login-ecr.outputs.registry }}/alwaysprint-prod-frontend
        working-directory: AlwaysPrintProject/Cloud/frontend
        run: |
          TAG=${GITHUB_SHA::8}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://alwaysprint.apps.iol.pe" \
            --build-arg NEXT_PUBLIC_WS_URL="wss://alwaysprint.apps.iol.pe" \
            --build-arg NEXT_PUBLIC_APP_NAME="AlwaysPrint Cloud Management" \
            --build-arg NEXT_PUBLIC_BUILD_TAG="$TAG" \
            -t $ECR_URL:$TAG \
            -t $ECR_URL:latest .
          docker push $ECR_URL:$TAG
          docker push $ECR_URL:latest

      - name: Deploy via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=alwaysprint-prod-ec2" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "EC2 Instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters 'commands=["bash /opt/alwaysprint/deploy.sh frontend"]' \
            --comment "Deploy frontend ${{ github.sha }}" \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Esperar hasta 5 minutos (30 intentos × 10 segundos)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "Intento $i/30: Status=$STATUS"

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              break
            fi
            sleep 10
          done

          # Mostrar output del comando
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output table

          [ "$STATUS" = "Success" ] || exit 1
