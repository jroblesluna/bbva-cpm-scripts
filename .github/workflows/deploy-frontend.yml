name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'AlwaysPrintProject/Cloud/frontend/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        working-directory: AlwaysPrintProject/Cloud/frontend
        run: |
          TAG=${GITHUB_SHA::8}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://alwaysprint.apps.iol.pe" \
            --build-arg NEXT_PUBLIC_WS_URL="wss://alwaysprint.apps.iol.pe" \
            --build-arg NEXT_PUBLIC_APP_NAME="AlwaysPrint Cloud Management" \
            -t ${{ secrets.FRONTEND_ECR_URL }}:$TAG \
            -t ${{ secrets.FRONTEND_ECR_URL }}:latest .
          docker push ${{ secrets.FRONTEND_ECR_URL }}:$TAG
          docker push ${{ secrets.FRONTEND_ECR_URL }}:latest

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ vars.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["bash /opt/alwaysprint/deploy.sh frontend"]' \
            --comment "Deploy frontend ${{ github.sha }}" \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ vars.EC2_INSTANCE_ID }}

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ vars.EC2_INSTANCE_ID }} \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output table

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ vars.EC2_INSTANCE_ID }} \
            --query "Status" --output text)

          [ "$STATUS" = "Success" ] || exit 1
