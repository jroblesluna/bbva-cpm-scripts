name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'AlwaysPrintProject/Cloud/frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        working-directory: AlwaysPrintProject/Cloud/frontend
        env:
          NEXT_PUBLIC_API_URL: "https://alwaysprint.apps.iol.pe"
          NEXT_PUBLIC_WS_URL: "wss://alwaysprint.apps.iol.pe"
          NEXT_PUBLIC_APP_NAME: "AlwaysPrint Cloud Management"
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          ECR_URL=${{ secrets.FRONTEND_ECR_URL }}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg NEXT_PUBLIC_WS_URL="$NEXT_PUBLIC_WS_URL" \
            --build-arg NEXT_PUBLIC_APP_NAME="$NEXT_PUBLIC_APP_NAME" \
            -t $ECR_URL:$IMAGE_TAG \
            -t $ECR_URL:latest .
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest
          echo "Image pushed: $ECR_URL:$IMAGE_TAG"

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/opt/alwaysprint/deploy.sh frontend"]' \
            --region ${{ secrets.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)
          echo "Deploy command sent: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --region ${{ secrets.AWS_REGION }} || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --region ${{ secrets.AWS_REGION }} \
            --query "{Status:Status,Output:StandardOutputContent}" \
            --output table
