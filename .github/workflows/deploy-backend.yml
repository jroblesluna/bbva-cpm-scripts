name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'AlwaysPrintProject/Cloud/backend/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        working-directory: AlwaysPrintProject/Cloud/backend
        run: |
          TAG=${GITHUB_SHA::8}
          docker build -t ${{ secrets.BACKEND_ECR_URL }}:$TAG -t ${{ secrets.BACKEND_ECR_URL }}:latest .
          docker push ${{ secrets.BACKEND_ECR_URL }}:$TAG
          docker push ${{ secrets.BACKEND_ECR_URL }}:latest

      - name: Get SSH key
        run: |
          aws secretsmanager get-secret-value \
            --secret-id /alwaysprint/prod/ssh_private_key \
            --region ${{ secrets.AWS_REGION }} \
            --query SecretString --output text > /tmp/ec2.pem
          chmod 600 /tmp/ec2.pem

      - name: Create deploy script
        env:
          BACKEND_ECR_URL: ${{ secrets.BACKEND_ECR_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cat > /tmp/deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          mkdir -p /opt/alwaysprint
          if [ ! -f /opt/alwaysprint/.env.backend ]; then
            DB_URL=\$(aws secretsmanager get-secret-value --secret-id /alwaysprint/prod/database_url --region ${AWS_REGION} --query SecretString --output text)
            SK=\$(aws secretsmanager get-secret-value --secret-id /alwaysprint/prod/secret_key --region ${AWS_REGION} --query SecretString --output text)
            printf "DATABASE_URL=%s\nSECRET_KEY=%s\nREDIS_URL=redis://localhost:6379/0\nLOG_LEVEL=INFO\nACCESS_TOKEN_EXPIRE_MINUTES=1440\nALGORITHM=HS256\nDB_POOL_SIZE=10\nDB_MAX_OVERFLOW=5\nWS_PING_INTERVAL=30\nWS_PING_TIMEOUT=60\nRATE_LIMIT_LOGIN=5\nRATE_LIMIT_API=100\nAPI_V1_STR=/api/v1\nCORS_ORIGINS=https://alwaysprint.apps.iol.pe\n" "\$DB_URL" "\$SK" > /opt/alwaysprint/.env.backend
          fi
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin $(echo ${BACKEND_ECR_URL} | cut -d/ -f1)
          docker pull ${BACKEND_ECR_URL}:latest
          docker rm -f alwaysprint-backend 2>/dev/null || true
          docker run -d --name alwaysprint-backend --restart unless-stopped --network host --env-file /opt/alwaysprint/.env.backend ${BACKEND_ECR_URL}:latest sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
          echo "Backend OK"
          SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Deploy to EC2
        run: |
          scp -i /tmp/ec2.pem -o StrictHostKeyChecking=no /tmp/deploy.sh ec2-user@${{ secrets.EC2_HOST }}:/tmp/deploy-backend.sh
          ssh -i /tmp/ec2.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} "bash /tmp/deploy-backend.sh"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2.pem /tmp/deploy.sh
