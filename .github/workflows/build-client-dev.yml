name: DEV → 📦 CLIENT

on:
  push:
    branches: [main]
    paths:
      - 'AlwaysPrintProject/Client/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install .NET Framework 4.8 Targeting Pack
        shell: pwsh
        run: |
          $refPath = "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.8"
          if (-not (Test-Path $refPath)) {
            Write-Error ".NET Framework 4.8 Targeting Pack no encontrado"
            exit 1
          }

      - name: Install WiX CLI v4
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add "WixToolset.Util.wixext/4.0.5" --global

      - name: Generate version
        id: version
        shell: pwsh
        run: |
          $now = [DateTime]::UtcNow
          $version = "1.$([int]$now.ToString('yy')).$([int]$now.ToString('MMdd')).$([int]$now.ToString('HHmm'))"
          Write-Host "Version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Copy dev logo assets
        shell: pwsh
        working-directory: AlwaysPrintProject
        run: |
          Copy-Item Logo\dev\alwaysprint_icon_dev.ico Client\logo-dev.ico -Force
          Copy-Item Logo\dev\alwaysprint_icon_dev.png Client\logo-dev.png -Force
          Copy-Item Logo\prod\alwaysprint_icon.ico Client\logo.ico -Force
          Copy-Item Logo\prod\alwaysprint_icon.png Client\logo.png -Force

      - name: Publish AlwaysPrintService
        shell: pwsh
        working-directory: AlwaysPrintProject/Client
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          dotnet publish .\AlwaysPrintService\AlwaysPrintService.csproj `
            -c Release -f net48 -o .\dist --no-self-contained `
            /p:Version=$v /p:AssemblyVersion=$v /p:FileVersion=$v /p:InformationalVersion=$v /p:Environment=dev
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Publish AlwaysPrintTray
        shell: pwsh
        working-directory: AlwaysPrintProject/Client
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          dotnet publish .\AlwaysPrintTray\AlwaysPrintTray.csproj `
            -c Release -f net48 -o .\dist --no-self-contained `
            /p:Version=$v /p:AssemblyVersion=$v /p:FileVersion=$v /p:InformationalVersion=$v /p:Environment=dev
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build MSI
        shell: pwsh
        working-directory: AlwaysPrintProject/Client
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $projectDir = (Get-Location).Path + "\"
          $msiName = "AlwaysPrint-DEV-$v.msi"
          wix build .\Product.wxs -o ".\$msiName" `
            -ext WixToolset.Util.wixext `
            -d "ProductVersion=$v" -d "ProjectDir=$projectDir" -d "Environment=dev"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          echo "MSI_NAME=$msiName" >> $env:GITHUB_OUTPUT
        id: msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: alwaysprint-msi
          path: AlwaysPrintProject/Client/${{ steps.msi.outputs.MSI_NAME }}
          retention-days: 5

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: alwaysprint-msi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Upload MSI to S3 (Dev)
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          MSI_NAME="AlwaysPrint-DEV-${VERSION}.msi"
          COMMIT="${{ github.sha }}"
          SHORT_COMMIT=${COMMIT::7}
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          METADATA="version=${VERSION},build-date=${BUILD_DATE},commit-hash=${SHORT_COMMIT}"

          aws s3 cp "$MSI_NAME" \
            "s3://alwaysprint-dev-artifacts/latest/AlwaysPrint.msi" \
            --metadata "$METADATA"
          aws s3 cp "$MSI_NAME" \
            "s3://alwaysprint-dev-artifacts/versions/${VERSION}/AlwaysPrint.msi" \
            --metadata "$METADATA"

          echo "MSI ${MSI_NAME} subido a S3 Dev"

      - name: Notify backend of new MSI version
        shell: bash
        run: |
          # Notificar al backend para que actualice el state map
          HTTP_CODE=$(curl -s -o /tmp/notify_response.json -w "%{http_code}" \
            -X POST "https://dev.alwaysprint.apps.iol.pe/api/v1/updates/notify-new-version" \
            -H "Content-Type: application/json")

          echo "Response code: ${HTTP_CODE}"
          cat /tmp/notify_response.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Backend notification failed (non-blocking)"
          else
            echo "✅ Backend state map updated"
          fi
